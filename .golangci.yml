version: "2"
run:
  tests: false
linters:
  enable:
    - bodyclose
    - goconst
    - godot
    - gosec
    - misspell
    - nakedret
    - nilerr
    - noctx
    - nolintlint
    - prealloc
    - revive
    - unconvert
    - unparam
    - whitespace
    - wrapcheck
  exclusions:
    generated: lax
    presets:
      - common-false-positives
    rules:
      - linters: [wrapcheck]
        path: "cmd/.*\\.go"
      # fmt.Fprintf to io.Writer status streams — errors are intentionally ignored
      # because these are best-effort diagnostic writes (stderr/prefixWriter).
      - linters: [errcheck]
        text: "fmt\\.F(printf|println|print)f?"
      # term.IsTerminal takes uintptr from os.File.Fd(); the conversion is safe
      # and is the idiomatic pattern for this API.
      - linters: [gosec]
        text: "G115"
      # awsShellRunner methods are thin adapters implementing an internal
      # interface; adding a wrap would provide no useful context.
      - linters: [wrapcheck]
        path: "internal/workflow/executor_shell\\.go"
      # io.Writer.Write delegations in mutex/locked writers — wrapping a Write
      # error makes no semantic sense for these adapter types.
      - linters: [wrapcheck]
        text: "error returned from interface method.*io\\.Writer"
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - goimports
  exclusions:
    generated: lax
